version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsechat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulsechat
      POSTGRES_PASSWORD: pulsechat
      POSTGRES_DB: pulsechat
    ports:
      - "5432:5432"
    volumes:
      - pulsechat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsechat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulsechat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pulsechat_pg_data:
