version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsechat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulsechat
      POSTGRES_PASSWORD: pulsechat
      POSTGRES_DB: pulsechat
    ports:
      - "5432:5432"
    volumes:
      - pulsechat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsechat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulsechat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: pulsechat-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"   # Kafka API - what your Node services connect to
      - "9644:9644"   # Admin API
    volumes:
      - pulsechat_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: pulsechat-redpanda-console
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"   # Open http://localhost:8080 to browse topics/messages visually
    depends_on:
      - redpanda

volumes:
  pulsechat_pg_data:
  pulsechat_redpanda_data:
